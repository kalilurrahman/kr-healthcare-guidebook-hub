<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Healthcare Digital Transformation — Strategic Perspectives 2025</title>
<style>
:root {
  --navy: #0A192F;
  --teal: #1A3C40;
  --gold: #C9A84C;
  --bg: #F8FAFB;
  --white: #FFFFFF;
  --text: #1A202C;
  --muted: #718096;
  --sidebar-w: 320px;
  --radius: 8px;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', -apple-system, system-ui, sans-serif; 
  background: var(--bg); 
  color: var(--text);
  display: flex;
  min-height: 100vh;
  line-height: 1.6;
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  color: white;
  position: fixed;
  height: 100vh;
  left: 0;
  top: 0;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  box-shadow: 10px 0 30px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
}

.brand { padding: 40px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.brand h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: 800; }
.brand p { font-size: 0.7rem; opacity: 0.5; margin-top: 6px; }

.search-box { padding: 15px 25px; }
#search-input {
  width: 100%;
  padding: 10px 15px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  color: white;
  outline: none;
  font-size: 0.8rem;
}

.nav-menu { flex: 1; padding: 10px 0; overflow-y: auto; }
.nav-group { padding: 15px 25px 5px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); font-weight: 700; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 15px; }
.nav-link {
  display: flex;
  padding: 10px 25px;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 0.82rem;
  border-left: 3px solid transparent;
  transition: 0.2s;
}
.nav-link:hover { color: white; background: rgba(255,255,255,0.03); }
.nav-link.active {
  background: rgba(255,255,255,0.08);
  border-left-color: var(--gold);
  color: white;
  font-weight: 600;
}

/* ── CONTENT AREA ── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 60px 8%;
  max-width: 1400px;
}

.chapter { display: none; animation: fadeIn 0.5s ease forwards; }
.chapter.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── UI COMPONENTS ── */
h1 { font-size: 2.8rem; color: var(--navy); margin-bottom: 12px; font-weight: 800; letter-spacing: -1px; }
.ch-meta { display: flex; gap: 10px; margin-bottom: 30px; align-items: center; }
.badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
.badge-gold { background: #FCF5E5; color: #9E7E2C; }
.badge-teal { background: #E6F0F0; color: #1A3C40; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin: 40px 0;
}
.stat-card {
  background: white;
  padding: 25px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border-top: 4px solid var(--gold);
}
.stat-card h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.stat-card .val { font-size: 1.8rem; font-weight: 900; color: var(--navy); }
.stat-card .sub { font-size: 0.8rem; margin-top: 5px; color: var(--muted); }

.visual-box {
  width: 100%;
  height: 450px;
  background: #E2E8F0;
  border-radius: var(--radius);
  margin: 40px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.ai-img { width: 100%; height: 100%; object-fit: cover; }

.callout {
  background: #EBF4F5;
  border-left: 6px solid var(--teal);
  padding: 30px;
  margin: 40px 0;
  border-radius: 0 var(--radius) var(--radius) 0;
}
.callout h3 { font-size: 1.3rem; margin-bottom: 12px; color: var(--teal); }

.action-list { list-style: none; margin: 30px 0; }
.action-list li { 
  background: white; padding: 18px; margin-bottom: 12px; border-radius: var(--radius);
  box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; align-items: flex-start; gap: 15px;
}
.action-list li::before { content: "→"; color: var(--gold); font-weight: 900; }

.footer-nav {
  margin-top: 60px;
  padding-top: 30px;
  border-top: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
}
.btn {
  padding: 12px 24px;
  background: var(--navy);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: 600;
  font-size: 0.9rem;
  transition: 0.3s;
  border: none;
  cursor: pointer;
}
.btn:hover { background: var(--teal); }

/* Mobile Navigation */
.mobile-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 2000; background: var(--navy); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
@media (max-width: 1024px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; padding: 40px 20px; }
  .mobile-toggle { display: block; }
}

.loader { display: flex; flex-direction: column; align-items: center; color: var(--muted); }
.spinner { width: 30px; height: 30px; border: 3px solid #cbd5e0; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

      { id: "ch2", title: "The 2027 Financial Floor", stats: [{ l: "2027 Projection", v: "8.7%" }, { l: "Margin Floor", v: "8.7%" }], content: "Projections indicate that this financial picture will worsen slightly by 2027, with industry EBITDA expected to drop to 8.7 percent of NHE. Success requires absorbing inflationary pressures through autonomous agents.", actions: ["Stress test 2027 budget scenarios", "Identify low-margin service lines for sunsetting", "Accelerate non-acute revenue shifts"] },

      { id: "ch4", title: "Executive Sentiment Analysis", stats: [{ l: "Favorable View", v: "60%" }, { l: "2024 Outlook", v: "52%" }], content: "Despite margin compression, 60% of healthcare executives express a favorable outlook for 2025. Confidence stems from successful technology investment and operational stabilization.", actions: ["Leverage board support for HST growth", "Shift focus from survival to scaling", "Audit 2025 growth investment plans"] },
      { id: "ch5", title: "Healthcare Software Surge", stats: [{ l: "Tech Spend ↑", v: "69%" }, { l: "Investment Target", v: "Software" }], content: "69% of US healthcare executives plan to increase software and technology investments to solve workforce gaps. Shift is from 'support' software to 'operational efficiency' software.", actions: ["Prioritize ambient AI documentation", "Invest in interoperable data lakes", "Deploy predictive diagnostic tools"] }
    ]
  },
  {

      { id: "ch6", title: "RCM Architecture: Nine Core Stages", stats: [{ l: "Stages", v: "9 Stages" }, { l: "Model", v: "Circular" }], content: "The modern RCM model is circular, not linear. Clinical documentation drives patient access, which in turn drives coding and claims in a continuous data loop.", actions: ["Map patient access to coding workflows", "Identify manual touchpoint leaks", "Align clinical CDI with billing cycles"] },
      { id: "ch7", title: "Patient Access & Scheduling", stats: [{ l: "Front-end Accuracy", v: "Target 98%" }, { l: "Denial Prev.", v: "High" }], content: "Patient Access is the front door. Automating eligibility and scheduling reduces denials by 15% at the source. AI-driven pre-auth prevents front-end rejection.", actions: ["Implement self-scheduling bots", "Automate eligibility verification", "Link scheduling to pre-auth status"] },
      { id: "ch8", title: "Coding & Clinical Doc Integrity (CDI)", stats: [{ l: "Coding Acc.", v: "95%+" }, { l: "CDI ROI", v: "High" }], content: "CDI is the bridge between care and payment. High-fidelity documentation ensures the acuity of the patient is accurately reflected, protecting the Case Mix Index (CMI).", actions: ["Deploy ambient AI for clinical notes", "Perform real-time coding audits", "Train staff on CDI specificity"] },

      { id: "ch10", title: "Denials & Appeals Management", stats: [{ l: "Denial Rate", v: "Target <4%" }, { l: "Recovery ROI", v: "High" }], content: "Denials management is shifting to denial prevention. AI analyzes historical data to fix root causes in documentation or eligibility upstream.", actions: ["Run root-cause denial analytics", "Automate standardized appeals", "Measure denial recovery velocity"] },
      { id: "ch11", title: "Patient Financial Services (PFS)", stats: [{ l: "Coll. Velocity", v: "Fast" }, { l: "Accuracy", v: "High" }], content: "PFS focuses on the backend of the cycle. Automated patient billing and clear financial transparency increase the propensity to pay while reducing admin cost.", actions: ["Implement digital patient portals", "Automate payment plan matching", "Monitor net-collection ratios"] },

      { id: "ch16", title: "Droidal: Training Day 1 (Fundamentals)", stats: [{ l: "Day 1", v: "Agent Ops" }, { l: "Focus", v: "Capabilities" }], content: "Day 1 focuses on how Droidal agents work. Staff learn agent capabilities in claims creation, validation, and status tracking to prepare for oversight.", actions: ["Conduct Droidal capability audit", "Map claim creation workflows", "Onboard staff to agent concepts"] },

      { id: "ch34", title: "Care Mgmt & Pop Health", stats: [{ l: "Impactability", v: "AI-Driven" }, { l: "ROI", v: "High" }], content: "Population health moves to proactive risk identification. AI identifies 'impactable' patients for targeted home-based interventions.", actions: ["Deploy predictive risk modeling", "Invest in respiratory RPM", "Scale community-based outreach"] },

const navMenu = document.getElementById('nav-menu');
const main = document.getElementById('main');

function render() {
  playbookData.forEach((vol) => {
    const label = document.createElement('div');
    label.className = 'nav-group';
    label.innerText = vol.group;
    navMenu.appendChild(label);

    vol.chapters.forEach((ch) => {
      const link = document.createElement('a');
      link.href = `#${ch.id}`;
      link.className = `nav-link ${ch.id === 'ch1' ? 'active' : ''}`;
      link.id = `nav-${ch.id}`;
      link.innerText = ch.title;
      link.onclick = (e) => { e.preventDefault(); navigate(ch.id); };
      navMenu.appendChild(link);

      const section = document.createElement('section');
      section.id = ch.id;
      section.className = `chapter ${ch.id === 'ch1' ? 'active' : ''}`;
      
      const statsHtml = ch.stats.map(s => `
        <div class="stat-card">
          <h4>${s.l}</h4>
          <div class="val">${s.v}</div>
          <p class="sub">Strategic Benchmark</p>
        </div>
      `).join('');

      const actionsHtml = ch.actions.map(a => `<li>${a}</li>`).join('');

      section.innerHTML = `
        <div class="ch-meta">
          <span class="badge badge-gold">${vol.group.split(':')[0]}</span>
          <span class="badge badge-teal">${Math.floor(Math.random()*4+5)} min read</span>
        </div>
        <h1>${ch.title}</h1>
        <p style="font-size:1.1rem; color:var(--muted); margin-bottom:30px;">Strategic Analysis & Implementation Roadmap</p>
        
        <div class="visual-box" id="vis-${ch.id}">
          <div class="loader"><div class="spinner"></div><p>Rendering Strategic Visualization...</p></div>
        </div>

        <div class="stat-grid">${statsHtml}</div>

        <div class="callout">
          <h3>The Strategic Perspective</h3>
          <p>${ch.content}</p>
        </div>

        <h3>Operational Interventions & Action Items</h3>
        <ul class="action-list">${actionsHtml}</ul>

        <div class="footer-nav">
          <button class="btn" onclick="navigatePrev('${ch.id}')">← Previous</button>
          <button class="btn" onclick="navigateNext('${ch.id}')">Next Section →</button>
        </div>
      `;
      main.appendChild(section);
    });
  });
}

function navigate(id) {
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  
  const target = document.getElementById(id);
  if(target) target.classList.add('active');
  const link = document.getElementById(`nav-${id}`);
  if(link) link.classList.add('active');
  
  if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0,0);
  
  const visBox = document.getElementById(`vis-${id}`);
  if (visBox && visBox.querySelector('.loader')) {
    const ch = findChapter(id);
    generateImage(ch.title, `vis-${id}`);
  }
}

function findChapter(id) {
  for(let v of playbookData) {
    for(let c of v.chapters) { if(c.id === id) return c; }
  }
  return null;
}

function navigateNext(currentId) {
  const allIds = playbookData.flatMap(v => v.chapters.map(c => c.id));
  const idx = allIds.indexOf(currentId);
  if(idx < allIds.length - 1) navigate(allIds[idx+1]);
}

function navigatePrev(currentId) {
  const allIds = playbookData.flatMap(v => v.chapters.map(c => c.id));
  const idx = allIds.indexOf(currentId);
  if(idx > 0) navigate(allIds[idx-1]);
}

async function generateImage(title, containerId) {
  const container = document.getElementById(containerId);
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instances: [{ prompt: `Professional executive healthcare visual for ${title}, minimalist clinical technology, high-end hospital environment, deep navy and gold lighting, cinematic architecture, photorealistic 8k` }], parameters: { sampleCount: 1 } })
    });
    const result = await res.json();
    if (result.predictions?.[0]?.bytesBase64Encoded) {
      const url = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
      container.innerHTML = `<img src="${url}" class="ai-img" alt="${title}">`;
    }
  } catch (err) {
    container.innerHTML = `<div class="loader" style="background:#cbd5e0; height:100%"><p>Strategic Context: ${title}</p></div>`;
  }
}

function searchPlaybook() {
  const q = document.getElementById('search-input').value.toLowerCase();
  if(q.length < 3) return;
  const allChapters = playbookData.flatMap(v => v.chapters);
  const match = allChapters.find(c => c.title.toLowerCase().includes(q) || c.content.toLowerCase().includes(q));
  if(match) navigate(match.id);
}

window.onload = () => {
  render();
  generateImage(playbookData[0].chapters[0].title, `vis-ch1`);
};
</script>
